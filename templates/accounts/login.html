{% extends 'base.html' %}
{% block title %}Đăng nhập — QLKH{% endblock %}
{% block auth_content %}
<div style="display:flex;min-height:100vh;align-items:center;justify-content:center;background:var(--surface-lowest);position:relative;overflow:hidden">
  
  <!-- Subtle brutalist background element -->
  <div style="position:absolute;top:-10%;right:-5%;width:600px;height:600px;background:var(--surface-low);border-radius:0.125rem;transform:rotate(-15deg);z-index:0"></div>
  <div style="position:absolute;bottom:-10%;left:-5%;width:400px;height:400px;background:var(--surface-dim);border-radius:0.125rem;transform:rotate(15deg);z-index:0"></div>

  <div class="card" style="width:100%;max-width:440px;position:relative;z-index:1;padding:3rem">
    <div style="margin-bottom:3rem">
      <div style="width:40px;height:40px;background:var(--primary);border-radius:0.125rem;display:flex;align-items:center;justify-content:center;margin-bottom:1.5rem">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--surface-lowest)" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
      </div>
      <h1 style="font-family:'Manrope',sans-serif;font-size:2rem;font-weight:800;letter-spacing:-0.03em;color:var(--on-surface);line-height:1.2;margin-bottom:0.5rem">Đăng nhập</h1>
      <p style="font-size:0.875rem;color:var(--on-surface-var)">Hệ thống Quản lý Khách hàng Precision Authority.</p>
    </div>

    <form method="post" id="login-form">
      {% csrf_token %}
      <div class="form-group" style="margin-bottom:1.5rem">
        <label for="id_username" class="form-label" style="font-size:0.6875rem">{{ form.username.label }}</label>
        {{ form.username }}
      </div>
      <div class="form-group" style="margin-bottom:2.5rem">
        <label for="id_password" class="form-label" style="font-size:0.6875rem">{{ form.password.label }}</label>
        {{ form.password }}
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:0.875rem">
        Truy cập hệ thống
      </button>
    </form>
    
    <div style="margin-top:3rem;text-align:center">
      <div style="font-size:0.6875rem;font-weight:600;letter-spacing:0.04em;color:var(--on-surface-var);text-transform:uppercase">QLKH System &copy; 2024</div>
    </div>
  </div>
</div>
{% endblock %}
