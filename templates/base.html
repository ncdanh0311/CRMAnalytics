<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    {% load static %}
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700&family=Inter:wght@400;500;700&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary-fixed": "#dae2fd",
                        outline: "#76777d",
                        "on-tertiary-fixed-variant": "#38485d",
                        "on-error-container": "#93000a",
                        background: "#f7f9fb",
                        "on-error": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "on-primary": "#ffffff",
                        "surface-container-low": "#f2f4f6",
                        "error-container": "#ffdad6",
                        "on-tertiary-container": "#75859d",
                        "on-primary-fixed": "#131b2e",
                        "inverse-on-surface": "#eff1f3",
                        "surface-container": "#eceef0",
                        "on-tertiary-fixed": "#0b1c30",
                        "secondary-fixed": "#d8e2ff",
                        "on-tertiary": "#ffffff",
                        "on-surface-variant": "#45464d",
                        "on-secondary-container": "#fefcff",
                        "surface-variant": "#e0e3e5",
                        "on-secondary-fixed": "#001a42",
                        "primary-fixed-dim": "#bec6e0",
                        "surface-container-highest": "#e0e3e5",
                        "outline-variant": "#c6c6cd",
                        primary: "#0f172a",
                        "surface-container-high": "#e6e8ea",
                        "surface-bright": "#f7f9fb",
                        "on-secondary-fixed-variant": "#004395",
                        "primary-container": "#131b2e",
                        "on-primary-fixed-variant": "#3f465c",
                        "tertiary-container": "#0b1c30",
                        "surface-dim": "#d8dadc",
                        "on-surface": "#191c1e",
                        error: "#ba1a1a",
                        "on-secondary": "#ffffff",
                        "inverse-primary": "#bec6e0",
                        surface: "#f7f9fb",
                        "secondary-container": "#2170e4",
                        secondary: "#3b82f6",
                        "secondary-fixed-dim": "#adc6ff",
                        "surface-tint": "#565e74",
                        "on-primary-container": "#7c839b",
                        "tertiary-fixed-dim": "#b7c8e1",
                        "inverse-surface": "#2d3133",
                        tertiary: "#000000",
                        "tertiary-fixed": "#d3e4fe",
                        "on-background": "#191c1e"
                    },
                    borderRadius: {
                        DEFAULT: "0.125rem",
                        lg: "0.25rem",
                        xl: "0.5rem",
                        full: "0.75rem"
                    },
                    spacing: {
                        gutter: "24px",
                        xl: "48px",
                        sm: "16px",
                        max_width: "1440px",
                        base: "4px",
                        lg: "32px",
                        margin: "32px",
                        xs: "8px",
                        md: "24px"
                    },
                    fontFamily: {
                        h1: ["Manrope"],
                        h2: ["Manrope"],
                        h3: ["Manrope"],
                        body: ["Inter"],
                        label: ["Inter"]
                    }
                }
            }
        };
    </script>
    <style>
        .icon-img { width: 20px; height: 20px; }
        .nav-item img { filter: brightness(0) invert(1); opacity: 0.7; }
        .nav-item:hover img, .nav-item.active img { opacity: 1; }
    </style>
</head>
<body class="bg-background font-body text-on-surface">
    <!-- TopNavBar -->
    <nav class="bg-surface border-b border-outline-variant h-20 fixed top-0 left-0 right-0 z-50">
        <div class="flex justify-between items-center w-full px-margin h-full max-w-max_width mx-auto">
            <div class="flex items-center gap-xl">
                <span class="text-2xl font-bold text-primary font-h3">AI Smart Commerce</span>
            </div>
            <div class="flex items-center gap-md">
                <div class="hidden md:flex relative items-center">
                    <img src="{% static 'icons/utility/icon-utility-search.png' %}" class="absolute left-3 w-5 opacity-40" alt="Search">
                    <input class="pl-10 pr-4 py-2 bg-surface-container-low border-none rounded-full w-64 text-sm focus:ring-2 focus:ring-secondary/20" placeholder="Tìm kiếm sản phẩm AI..." type="text"/>
                </div>
                <div class="flex items-center gap-sm">
                    <img src="{% static 'icons/actions/icon-actions-summary.png' %}" class="w-6 cursor-pointer" alt="Cart">
                    <img src="{% static 'icons/utility/icon-utility-bell.png' %}" class="w-6 cursor-pointer" alt="Notifications">
                    <div class="w-8 h-8 rounded-full overflow-hidden border border-outline">
                         <img src="{% static 'icons/navigations/icon-nav-profile-circle.png' %}" class="w-full h-full" alt="User">
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="flex max-w-max_width mx-auto pt-20">
        <!-- SideNavBar -->
        <aside class="hidden lg:flex flex-col h-[calc(100vh-80px)] w-64 fixed left-[max(0px,calc(50%-720px))] bg-primary-container text-on-primary-container p-md border-r border-outline-variant shadow-md">
            <nav class="flex-1 space-y-xs">
                <a class="flex items-center gap-sm px-sm py-3 bg-secondary text-on-secondary rounded-lg font-bold transition-all nav-item active" href="{% url 'ecommerce_index' %}">
                    <img src="{% static 'icons/navigations/icon-nav-home-outline.png' %}" class="icon-img" alt="Home">
                    Dashboard
                </a>
                <a class="flex items-center gap-sm px-sm py-3 text-on-primary-container/70 hover:text-on-primary-container hover:bg-white/10 rounded-lg transition-all nav-item" href="#">
                    <img src="{% static 'icons/navigations/icon-nav-notebook-outline.png' %}" class="icon-img" alt="Categories">
                    Categories
                </a>
                <a class="flex items-center gap-sm px-sm py-3 text-on-primary-container/70 hover:text-on-primary-container hover:bg-white/10 rounded-lg transition-all nav-item" href="#">
                    <img src="{% static 'icons/actions/icon-actions-ai-chat.png' %}" class="icon-img" alt="AI Agent">
                    AI Agent
                </a>
                <a class="flex items-center gap-sm px-sm py-3 text-on-primary-container/70 hover:text-on-primary-container hover:bg-white/10 rounded-lg transition-all nav-item" href="#">
                    <img src="{% static 'icons/utility/icon-utility-filter-sliders.png' %}" class="icon-img" alt="Settings">
                    Settings
                </a>
            </nav>
            <div class="mt-auto p-md bg-white/5 rounded-xl border border-white/10">
                <p class="text-xs opacity-60 mb-sm font-bold uppercase">AI Insights</p>
                <p class="text-xs opacity-80">Phân tích 50 đơn hàng mới nhất...</p>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 lg:ml-64 p-margin">
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
